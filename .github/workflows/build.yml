name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 构建服务端二进制（多平台交叉编译）
  # ─────────────────────────────────────────────
  build-server:
    name: Server / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          OUTPUT="dist/kite-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "${OUTPUT}" \
            .

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Job 2: 构建 Wails 桌面应用 — Windows
  # ─────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop / windows-amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build desktop app (Windows)
        run: wails build -nsis -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: build/bin/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Job 3: 构建 Wails 桌面应用 — macOS (universal)
  # ─────────────────────────────────────────────
  build-desktop-macos:
    name: Desktop / macos-universal
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build desktop app (macOS universal)
        run: wails build -platform darwin/universal -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Package as DMG
        run: |
          APP_PATH=$(find build/bin -name "*.app" | head -1)
          hdiutil create -volname "Kite Proxy" \
            -srcfolder "${APP_PATH}" \
            -ov -format UDZO \
            build/bin/kite-proxy-macos-universal.dmg

      - name: Upload macOS desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: build/bin/*.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Job 4: 构建 Wails 桌面应用 — Linux
  # ─────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop / linux-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            nsis \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build desktop app (Linux)
        run: wails build -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Upload Linux desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: build/bin/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Job 5: 创建 Release（仅在推送 tag 时触发）
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-server
      - build-desktop-windows
      - build-desktop-macos
      - build-desktop-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Kite Proxy ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
