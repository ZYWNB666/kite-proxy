name: Desktop CI Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            package_name: kite-proxy-windows-amd64.zip
          - name: macos-amd64
            os: macos-latest
            platform: darwin/amd64
            package_name: kite-proxy-macos-amd64.tar.gz
          - name: macos-arm64
            os: macos-latest
            platform: darwin/arm64
            package_name: kite-proxy-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop app
        run: wails build -platform ${{ matrix.platform }} -tags desktop -skipbindings -s

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath dist/${{ matrix.package_name }} -Force

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.package_name }} -C build/bin kite-proxy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: dist/${{ matrix.package_name }}
          if-no-files-found: error